<!DOCTYPE html>
<html>
<head>
    <title>My Daily Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>📅 My Daily Schedule</h2>

    <div class="schedule morning">
        <h3>🌅 Morning</h3>
        <ul>
            <li>Wake up at 6:00 AM</li>
            <li>Exercise</li>
            <li>Breakfast</li>
        </ul>
    </div>

    <div class="schedule afternoon">
        <h3>☀️ Afternoon</h3>
        <ul>
            <li>Attend Classes</li>
            <li>Lunch Break</li>
            <li>Study</li>
        </ul>
    </div>

    <div class="schedule evening">
        <h3>🌙 Evening</h3>
        <ul>
            <li>Play Games</li>
            <li>Complete Homework</li>
            <li>Sleep by 10:00 PM</li>
        </ul>
    </div>

</body>
</html>
