<!DOCTYPE html>
<html>
<head>
    <title>Event Invitation Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card">

            <h2>🎉 Event Invitation</h2>

            <p class="welcome">
                Join us for an evening of celebration and joy!
            </p>

            <p>
                <strong>Event:</strong> Annual Cultural Fest
            </p>

            <p>
                <strong>Date:</strong> 15 August 2026
            </p>

            <p>
                <strong>Time:</strong> 6:00 PM
            </p>

            <p>
                <strong>Venue:</strong> City Hall Auditorium
            </p>

            <p class="message">
                We look forward to your presence.
            </p>

            <button>Confirm Attendance</button>

        </div>

    </div>

</body>
</html>
